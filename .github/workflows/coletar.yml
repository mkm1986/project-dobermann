name: Dobermann - Coletor Diario

on:
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests scipy numpy google-api-python-client google-auth google-auth-oauthlib

      - name: Criar service_account.json
        env:
          SA_PRIVATE_KEY: ${{ secrets.SA_PRIVATE_KEY }}
          SA_PRIVATE_KEY_ID: ${{ secrets.SA_PRIVATE_KEY_ID }}
        run: |
          python - <<'PYEOF'
          import os, json
          sa = {
              "type": "service_account",
              "project_id": "project-dobermann-495202",
              "private_key_id": os.environ["SA_PRIVATE_KEY_ID"],
              "private_key": os.environ["SA_PRIVATE_KEY"].replace("\\n", "\n"),
              "client_email": "dobermann-sync@project-dobermann-495202.iam.gserviceaccount.com",
              "client_id": "118363561173291608863",
              "auth_uri": "https://accounts.google.com/o/oauth2/auth",
              "token_uri": "https://oauth2.googleapis.com/token",
              "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
              "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/dobermann-sync%40project-dobermann-495202.iam.gserviceaccount.com",
              "universe_domain": "googleapis.com"
          }
          with open("service_account.json", "w") as f:
              json.dump(sa, f)
          print("service_account.json criado com sucesso")
          PYEOF

      - name: Criar config
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import os
          lines = [
              'RAPIDAPI_KEY = ""',
              f'ODDS_API_KEY = "{os.environ["ODDS_API_KEY"]}"',
              f'ODDS_API_IO_KEY = "{os.environ["ODDS_API_IO_KEY"]}"',
              f'TELEGRAM_TOKEN = "{os.environ["TELEGRAM_TOKEN"]}"',
              f'TELEGRAM_CHAT_ID = "{os.environ["TELEGRAM_CHAT_ID"]}"',
              'LIGAS_PRINCIPAIS = ["soccer_norway_eliteserien","soccer_sweden_allsvenskan","soccer_denmark_superliga","soccer_finland_veikkausliiga","soccer_ireland_premier_division"]',
              'LIGAS_OBSCURAS = ["soccer_iceland_premier_division","soccer_usa_usl_championship"]',
              'KELLY_FRACAO = 0.25',
              'KELLY_FRACAO_ALTA = 0.25',
              'KELLY_FRACAO_BAIXA = 0.35',
              'MIN_EDGE_PRINCIPAL = 0.02',
              'MIN_EDGE_OBSCURO = 0.04',
              'MIN_EDGE = 0.02',
              'MIN_ODD_PRINCIPAL = 3.00',
              'MIN_ODD_OBSCURO = 3.00',
              'MIN_ODD_ML = 3.00',
              'MIN_ODD_DNB = 3.00',
              'MAX_ODD_PRINCIPAL = 50.00',
              'MAX_ODD_OBSCURO = 50.00',
              'MAX_ODD = 50.00',
              'MAX_EV = 3.00',
              'MIN_JOGOS_HISTORICO = 3',
              'JANELA_HISTORICO = 38',
              'BANCA_ATUAL = 1000.0',
              'MAX_APOSTA_PERCENTUAL = 0.03',
              'MAX_APOSTA_VALOR = 30.00',
              'DATABASE_PATH = "apostas.db"',
          ]
          with open("config.py", "w") as f:
              f.write("\n".join(lines))
          print("config.py criado")
          PYEOF

      - name: Baixar banco do Google Drive
        run: python drive_sync.py forcar

      - name: Rodar coletor
        run: python coletor.py

      - name: Salvar banco no Google Drive
        run: python drive_sync.py subir
